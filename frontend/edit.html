
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Student</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="site-header">
    <a class="logo" href="index.html">Scholar<span>Base</span></a>
    <a class="btn btn-ghost" href="index.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 13L5 8l5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
  </header>

  <!-- Form card -->
  <div class="form-card" id="form-card">
    <div class="loading-row"><span class="spinner"></span></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/api.js"></script>
<script>
  const studentId = getParam("id");

  if (!studentId) {
    window.location.href = "index.html";
  }

  async function loadStudent() {
    const card = document.getElementById("form-card");
    try {
      const s = await api.get(`/students/${studentId}`);
      renderForm(s);
    } catch (err) {
      card.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>${err.message}</p>
          <a class="btn btn-outline" style="margin-top:16px" href="index.html">Go Home</a>
        </div>`;
    }
  }

  function renderForm(s) {
    document.getElementById("form-card").innerHTML = `
      <h2 class="form-title">Edit Student</h2>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" value="${escAttr(s.name)}" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" min="1" max="100" value="${s.age}" />
      </div>

      <div class="form-group">
        <label for="branch">Branch</label>
        <input type="text" id="branch" value="${escAttr(s.branch)}" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" value="${escAttr(s.email)}" />
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="save-btn" onclick="saveStudent()">
          Save Changes
        </button>
        <button class="btn btn-danger" id="delete-btn" onclick="deleteStudent()">
          Delete Student
        </button>
        <a class="btn btn-outline" href="index.html">Cancel</a>
      </div>
    `;
  }

  async function saveStudent() {
    const name   = document.getElementById("name").value.trim();
    const age    = parseInt(document.getElementById("age").value, 10);
    const branch = document.getElementById("branch").value.trim();
    const email  = document.getElementById("email").value.trim();

    if (!name || !branch || !email) {
      showToast("Please fill in all fields.", "error"); return;
    }
    if (isNaN(age) || age < 1 || age > 100) {
      showToast("Please enter a valid age (1–100).", "error"); return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast("Please enter a valid email address.", "error"); return;
    }

    const btn = document.getElementById("save-btn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving…';

    try {
      await api.put(`/students/${studentId}`, { name, age, branch, email });
      sessionStorage.setItem("flash", JSON.stringify({ msg: "Student updated successfully!", type: "success" }));
      window.location.href = "index.html";
    } catch (err) {
      showToast(err.message, "error");
      btn.disabled = false;
      btn.textContent = "Save Changes";
    }
  }

  async function deleteStudent() {
    if (!confirm("Delete this student? This cannot be undone.")) return;

    const btn = document.getElementById("delete-btn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Deleting…';

    try {
      await api.delete(`/students/${studentId}`);
      sessionStorage.setItem("flash", JSON.stringify({ msg: "Student deleted.", type: "success" }));
      window.location.href = "index.html";
    } catch (err) {
      showToast(err.message, "error");
      btn.disabled = false;
      btn.textContent = "Delete Student";
    }
  }

  function escAttr(str) {
    return str.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  loadStudent();
</script>
</body>
</html>
