<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students — Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="site-header">
    <a class="logo" href="index.html">Scholar<span>Base</span></a>
  </header>

  <!-- Page top row -->
  <div class="page-top">
    <h1 class="page-title">All Students</h1>
    <a class="btn btn-primary" href="add.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add New Student
    </a>
  </div>

  <!-- Student list -->
  <div id="student-list">
    <div class="loading-row"><span class="spinner"></span></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/api.js"></script>
<script>
  // Show a success message if redirected after an action
  const flash = sessionStorage.getItem("flash");
  if (flash) {
    const { msg, type } = JSON.parse(flash);
    sessionStorage.removeItem("flash");
    setTimeout(() => showToast(msg, type), 200);
  }

  async function loadStudents() {
    const container = document.getElementById("student-list");
    try {
      const students = await api.get("/students");

      if (students.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎓</div>
            <p>No students yet. Add the first one!</p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="student-grid">${students.map(renderCard).join("")}</div>`;
    } catch (err) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>${err.message}</p>
        </div>`;
    }
  }

  function renderCard(s) {
    return `
      <div class="student-card">
        <div class="student-info">
          <div class="student-name">${escHtml(s.name)}</div>
          <div class="student-meta">
            <span class="meta-pill">Age ${escHtml(String(s.age))}</span>
            <span class="meta-pill">${escHtml(s.branch)}</span>
            <span class="meta-pill">${escHtml(s.email)}</span>
          </div>
        </div>
        <div class="card-actions">
          <a class="btn btn-outline btn-sm" href="edit.html?id=${s.id}">Edit</a>
          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}', this)">Delete</button>
        </div>
      </div>`;
  }

  async function deleteStudent(id, btn) {
    if (!confirm("Delete this student? This cannot be undone.")) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api.delete(`/students/${id}`);
      showToast("Student deleted.", "success");
      loadStudents();
    } catch (err) {
      showToast(err.message, "error");
      btn.disabled = false;
      btn.textContent = "Delete";
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  loadStudents();
</script>
</body>
</html>
